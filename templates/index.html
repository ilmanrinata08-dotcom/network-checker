<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBER LAB</title>
<style>
/* ═══════════════════════════════
   BASE
═══════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#000;
  color:#00ff64;
  font-family:'Courier New',monospace;
  min-height:100vh;
  overflow-x:hidden;
}

/* ═══════════════════════════════
   CYBER GRID BACKGROUND
═══════════════════════════════ */
.grid-bg{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background-image:
    linear-gradient(rgba(0,255,100,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,100,0.03) 1px, transparent 1px);
  background-size:30px 30px;
  z-index:0;
  pointer-events:none;
}

/* ═══════════════════════════════
   RAIN CANVAS
═══════════════════════════════ */
#rain{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  z-index:1;
  pointer-events:none;
  opacity:0.15;
}

/* ═══════════════════════════════
   MAIN CONTAINER
═══════════════════════════════ */
.container{
  position:relative;
  z-index:10;
  max-width:480px;
  margin:0 auto;
  padding:16px;
}

/* ═══════════════════════════════
   HEADER
═══════════════════════════════ */
.header{
  text-align:center;
  padding:24px 0 16px;
}

.header h1{
  font-size:22px;
  letter-spacing:6px;
  color:#00ff64;
  text-shadow:
    0 0 10px #00ff64,
    0 0 30px #00ff64,
    0 0 60px #00ff64;
  animation:pulse 2s ease-in-out infinite;
}

.header .sub{
  font-size:10px;
  color:#00ff6450;
  letter-spacing:3px;
  margin-top:6px;
}

.status-bar{
  display:flex;
  justify-content:center;
  gap:16px;
  margin-top:10px;
  font-size:10px;
  letter-spacing:2px;
}

.status-dot{
  color:#00ff64;
  animation:blink 1s infinite;
}

@keyframes pulse{
  0%,100%{text-shadow:0 0 10px #00ff64, 0 0 30px #00ff64;}
  50%{text-shadow:0 0 20px #00ff64, 0 0 60px #00ff64, 0 0 100px #00ff64;}
}

@keyframes blink{
  0%,100%{opacity:1;}
  50%{opacity:0.3;}
}

/* ═══════════════════════════════
   HOLOGRAM CARD
═══════════════════════════════ */
.card{
  background:rgba(0,255,100,0.02);
  border:1px solid rgba(0,255,100,0.15);
  border-radius:16px;
  padding:24px;
  margin-bottom:16px;
  position:relative;
  overflow:hidden;
}

.card::before{
  content:'';
  position:absolute;
  top:-50%;left:-50%;
  width:200%;height:200%;
  background:conic-gradient(
    transparent 0deg,
    rgba(0,255,100,0.03) 60deg,
    transparent 120deg
  );
  animation:rotate 8s linear infinite;
}

.card::after{
  content:'';
  position:absolute;
  inset:1px;
  border-radius:15px;
  background:#000;
  z-index:0;
}

.card-content{
  position:relative;
  z-index:1;
}

@keyframes rotate{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* ═══════════════════════════════
   NEON BORDER ANIMATION
═══════════════════════════════ */
.neon-border{
  position:relative;
  border-radius:16px;
  padding:2px;
  background:linear-gradient(
    45deg,
    #00ff64, #0080ff, #ff00ff, #00ff64
  );
  background-size:300% 300%;
  animation:neon-move 4s linear infinite;
  margin-bottom:16px;
}

.neon-inner{
  background:#000;
  border-radius:14px;
  padding:24px;
}

@keyframes neon-move{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* ═══════════════════════════════
   TABS
═══════════════════════════════ */
.tabs{
  display:flex;
  gap:8px;
  margin-bottom:16px;
}

.tab{
  flex:1;
  padding:10px 4px;
  background:transparent;
  border:1px solid #0a2a0a;
  border-radius:8px;
  color:#1a4a1a;
  font-family:'Courier New',monospace;
  font-size:9px;
  letter-spacing:1px;
  cursor:pointer;
  transition:all 0.3s;
}

.tab.active{
  border-color:#00ff64;
  color:#00ff64;
  background:rgba(0,255,100,0.05);
  box-shadow:0 0 10px rgba(0,255,100,0.2);
}

/* ═══════════════════════════════
   RADAR
═══════════════════════════════ */
.radar-wrap{
  display:flex;
  justify-content:center;
  margin:12px 0;
}

.radar{
  width:80px;height:80px;
  border-radius:50%;
  border:1px solid rgba(0,255,100,0.2);
  position:relative;
  display:none;
}

.radar.active{ display:block; }

.radar::before{
  content:'';
  position:absolute;
  inset:10px;
  border-radius:50%;
  border:1px solid rgba(0,255,100,0.15);
}

.radar-sweep{
  position:absolute;
  top:50%;left:50%;
  width:50%;height:1px;
  background:linear-gradient(90deg, #00ff64, transparent);
  transform-origin:left center;
  animation:sweep 2s linear infinite;
}

@keyframes sweep{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* ═══════════════════════════════
   INPUT
═══════════════════════════════ */
label{
  display:block;
  font-size:9px;
  letter-spacing:2px;
  color:#00ff6460;
  margin-bottom:6px;
  margin-top:14px;
}

input{
  width:100%;
  padding:12px 14px;
  background:#000;
  border:1px solid #0a2a0a;
  border-radius:8px;
  color:#00ff64;
  font-family:'Courier New',monospace;
  font-size:13px;
  outline:none;
  transition:all 0.3s;
}

input:focus{
  border-color:#00ff64;
  box-shadow:0 0 15px rgba(0,255,100,0.15);
}

input::placeholder{color:#0a2a0a;}

/* ═══════════════════════════════
   BUTTON
═══════════════════════════════ */
.btn{
  width:100%;
  padding:14px;
  margin-top:14px;
  background:transparent;
  border:1px solid #00ff64;
  border-radius:8px;
  color:#00ff64;
  font-family:'Courier New',monospace;
  font-size:12px;
  font-weight:bold;
  letter-spacing:3px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:all 0.3s;
}

.btn::before{
  content:'';
  position:absolute;
  top:0;left:-100%;
  width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(0,255,100,0.1),transparent);
  transition:left 0.5s;
}

.btn:hover::before{left:100%;}
.btn:hover{
  background:rgba(0,255,100,0.08);
  box-shadow:0 0 20px rgba(0,255,100,0.3);
}

.btn:disabled{
  border-color:#0a2a0a;
  color:#0a2a0a;
  cursor:not-allowed;
}

/* ═══════════════════════════════
   RESULT
═══════════════════════════════ */
.result{
  margin-top:14px;
  padding:14px;
  border-radius:8px;
  text-align:center;
  font-size:12px;
  font-weight:bold;
  letter-spacing:1px;
  display:none;
  animation:fadein 0.3s ease;
}

.result.online{
  background:rgba(0,255,100,0.05);
  border:1px solid #00ff64;
  color:#00ff64;
  box-shadow:0 0 20px rgba(0,255,100,0.1);
}

.result.offline{
  background:rgba(255,50,50,0.05);
  border:1px solid #ff3232;
  color:#ff3232;
}

.result.error{
  background:rgba(255,200,0,0.05);
  border:1px solid #ffc800;
  color:#ffc800;
}

@keyframes fadein{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}

/* ═══════════════════════════════
   PORT ITEMS
═══════════════════════════════ */
.port-item{
  display:flex;
  justify-content:space-between;
  padding:8px 12px;
  border-radius:6px;
  margin-bottom:4px;
  font-size:11px;
  font-weight:bold;
  animation:fadein 0.3s ease;
}

.port-item.open{
  background:rgba(0,255,100,0.05);
  border:1px solid #00ff6440;
  color:#00ff64;
}

.port-item.closed{
  background:rgba(255,255,255,0.01);
  border:1px solid #ffffff08;
  color:#1a3a1a;
}

/* ═══════════════════════════════
   WHOIS TABLE
═══════════════════════════════ */
.whois-row{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid #0a2a0a;
  font-size:11px;
}

.whois-key{color:#00ff6460;letter-spacing:1px;}
.whois-val{color:#00ff64;text-align:right;}

/* ═══════════════════════════════
   SKELETON
═══════════════════════════════ */
.skeleton{
  height:44px;
  border-radius:8px;
  margin-top:14px;
  background:linear-gradient(90deg,#0a0a0a 25%,#111 50%,#0a0a0a 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
  display:none;
}

@keyframes shimmer{
  to{background-position-x:-200%;}
}

/* ═══════════════════════════════
   HISTORY
═══════════════════════════════ */
.history-item{
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  border-bottom:1px solid #0a0a0a;
  font-size:10px;
}

.dot-online{color:#00ff64;}
.dot-offline{color:#ff3232;}
.dot-error{color:#ffc800;}

/* ═══════════════════════════════
   FOOTER
═══════════════════════════════ */
.footer{
  text-align:center;
  padding:20px;
  font-size:9px;
  color:#0a2a0a;
  letter-spacing:2px;
}

/* ═══════════════════════════════
   PARTICLES
═══════════════════════════════ */
.particle{
  position:fixed;
  width:2px;height:2px;
  background:#00ff64;
  border-radius:50%;
  pointer-events:none;
  z-index:2;
  animation:float linear infinite;
}

@keyframes float{
  0%{transform:translateY(100vh) translateX(0);opacity:0;}
  10%{opacity:1;}
  90%{opacity:1;}
  100%{transform:translateY(-100px) translateX(50px);opacity:0;}
}
</style>
</head>
<body>

<!-- GRID BG -->
<div class="grid-bg"></div>

<!-- RAIN -->
<canvas id="rain"></canvas>

<!-- PARTICLES -->
<div id="particles"></div>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h1>⚡ CYBER LAB</h1>
    <div class="sub">TKJ NETWORK TOOLS · PYTHON 3.13 · FLASK</div>
    <div class="status-bar">
      <span><span class="status-dot">●</span> ONLINE</span>
      <span>|</span>
      <span>🛡️ SECURE MODE</span>
      <span>|</span>
      <span id="clock">--:--:--</span>
    </div>
  </div>

  <!-- NEON CARD -->
  <div class="neon-border">
  <div class="neon-inner">

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('ping')">📡 PING</button>
      <button class="tab" onclick="switchTab('scan')">🔍 SCAN</button>
      <button class="tab" onclick="switchTab('whois')">🌍 WHOIS</button>
    </div>

    <!-- ═══ PING TAB ═══ -->
    <div id="tab-ping">
      <div class="radar-wrap">
        <div class="radar active" id="radar">
          <div class="radar-sweep"></div>
        </div>
      </div>
      <label>TARGET IP ADDRESS</label>
      <input type="text" id="pingIP" placeholder="8.8.8.8" maxlength="15"/>
      <button class="btn" id="btnPing" onclick="doPing()">📡 CEK SEKARANG</button>
      <div class="skeleton" id="skelPing"></div>
      <div class="result" id="resPing"></div>
      <div style="margin-top:16px;" id="historyWrap" style="display:none;">
        <div style="font-size:9px;color:#00ff6440;letter-spacing:2px;margin-bottom:8px;">RIWAYAT</div>
        <div id="historyList"></div>
      </div>
    </div>

    <!-- ═══ SCAN TAB ═══ -->
    <div id="tab-scan" style="display:none;">
      <label>TARGET IP ADDRESS</label>
      <input type="text" id="scanIP" placeholder="127.0.0.1" maxlength="15"/>
      <label>PORTS (PISAH KOMA)</label>
      <input type="text" id="scanPorts" value="21,22,23,53,80,443,3306,8080,8291"/>
      <button class="btn" id="btnScan" onclick="doScan()">🔍 SCAN SEKARANG</button>
      <div class="skeleton" id="skelScan"></div>
      <div id="resScan" style="margin-top:14px;"></div>
    </div>

    <!-- ═══ WHOIS TAB ═══ -->
    <div id="tab-whois" style="display:none;">
      <label>TARGET IP ADDRESS</label>
      <input type="text" id="whoisIP" placeholder="8.8.8.8" maxlength="15"/>
      <button class="btn" id="btnWhois" onclick="doWhois()">🌍 LOOKUP SEKARANG</button>
      <div class="skeleton" id="skelWhois"></div>
      <div id="resWhois" style="margin-top:14px;"></div>
    </div>

  </div>
  </div>

  <div class="footer">
    CYBER LAB v2.0 · TKJ EDITION · EDUCATIONAL USE ONLY
  </div>

</div>

<script>
// ═══════════════════════════
// CLOCK
// ═══════════════════════════
function updateClock(){
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('id-ID');
}
setInterval(updateClock, 1000);
updateClock();

// ═══════════════════════════
// TERMINAL RAIN
// ═══════════════════════════
const canvas = document.getElementById('rain');
const ctx    = canvas.getContext('2d');

function resizeCanvas(){
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノ';
const fontSize = 12;
let cols = Math.floor(canvas.width / fontSize);
let drops = Array(cols).fill(1);

function drawRain(){
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00ff64';
  ctx.font = fontSize + 'px monospace';
  drops.forEach((y, i) => {
    const char = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillText(char, i * fontSize, y * fontSize);
    if(y * fontSize > canvas.height && Math.random() > 0.975){
      drops[i] = 0;
    }
    drops[i]++;
  });
}
setInterval(drawRain, 50);

// ═══════════════════════════
// PARTICLES
// ═══════════════════════════
function createParticle(){
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + 'vw';
  p.style.animationDuration = (Math.random() * 10 + 8) + 's';
  p.style.animationDelay    = (Math.random() * 5) + 's';
  p.style.opacity = Math.random() * 0.5 + 0.1;
  document.getElementById('particles').appendChild(p);
  setTimeout(() => p.remove(), 15000);
}
setInterval(createParticle, 800);

// ═══════════════════════════
// TABS
// ═══════════════════════════
function switchTab(tab){
  ['ping','scan','whois'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? '' : 'none';
  });
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', ['ping','scan','whois'][i] === tab);
  });
}

// ═══════════════════════════
// HISTORY
// ═══════════════════════════
let history = [];
function addHistory(ip, status){
  history.unshift({ip, status, time: new Date().toLocaleTimeString('id-ID')});
  if(history.length > 5) history.pop();
  const list = document.getElementById('historyList');
  document.getElementById('historyWrap').style.display = '';
  list.innerHTML = history.map(h => `
    <div class="history-item">
      <span style="color:#333">${h.time}</span>
      <span style="color:#555">${h.ip}</span>
      <span class="dot-${h.status}">● ${h.status.toUpperCase()}</span>
    </div>
  `).join('');
}

// ═══════════════════════════
// PING
// ═══════════════════════════
let isRunning = false;

async function doPing(){
  if(isRunning) return;
  const ip  = document.getElementById('pingIP').value.trim();
  const btn = document.getElementById('btnPing');
  const res = document.getElementById('resPing');
  const sk  = document.getElementById('skelPing');

  if(!ip){ showResult(res, 'error', '⚠️ IP tidak boleh kosong!'); return; }

  isRunning = true;
  btn.disabled = true;
  btn.textContent = '⏳ CHECKING...';
  res.style.display = 'none';
  sk.style.display  = 'block';

  try{
    const r = await fetch('/cek', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ip})
    });
    const data = await r.json();
    sk.style.display = 'none';
    showResult(res, data.status, data.pesan);
    addHistory(ip, data.status);
  } catch(e){
    sk.style.display = 'none';
    showResult(res, 'error', '⚠️ Koneksi ke server gagal!');
  } finally{
    isRunning = false;
    btn.disabled = false;
    btn.textContent = '📡 CEK SEKARANG';
  }
}

// ═══════════════════════════
// SCAN
// ═══════════════════════════
async function doScan(){
  const ip    = document.getElementById('scanIP').value.trim();
  const ports = document.getElementById('scanPorts').value
                  .split(',').map(p => p.trim()).filter(Boolean);
  const btn   = document.getElementById('btnScan');
  const res   = document.getElementById('resScan');
  const sk    = document.getElementById('skelScan');

  btn.disabled = true;
  btn.textContent = '⏳ SCANNING...';
  res.innerHTML = '';
  sk.style.display = 'block';

  try{
    const r = await fetch('/scan', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ip, ports})
    });
    const data = await r.json();
    sk.style.display = 'none';

    if(data.status === 'error'){
      res.innerHTML = `<div class="result error" style="display:block">${data.pesan}</div>`;
      return;
    }

    res.innerHTML = data.hasil.map(h => `
      <div class="port-item ${h.status}">
        <span>PORT ${h.port}</span>
        <span>${h.status === 'open' ? '🟢 OPEN' : '⚫ CLOSED'}</span>
      </div>
    `).join('');
  } catch(e){
    sk.style.display = 'none';
    res.innerHTML = `<div class="result error" style="display:block">⚠️ Koneksi gagal!</div>`;
  } finally{
    btn.disabled = false;
    btn.textContent = '🔍 SCAN SEKARANG';
  }
}

// ═══════════════════════════
// WHOIS
// ═══════════════════════════
async function doWhois(){
  const ip  = document.getElementById('whoisIP').value.trim();
  const btn = document.getElementById('btnWhois');
  const res = document.getElementById('resWhois');
  const sk  = document.getElementById('skelWhois');

  btn.disabled = true;
  btn.textContent = '⏳ LOOKING UP...';
  res.innerHTML = '';
  sk.style.display = 'block';

  try{
    const r = await fetch('/whois', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ip})
    });
    const data = await r.json();
    sk.style.display = 'none';

    if(data.status === 'error'){
      res.innerHTML = `<div class="result error" style="display:block">${data.pesan}</div>`;
      return;
    }

    res.innerHTML = `
      <div class="card" style="margin-top:0;">
      <div class="card-content">
        ${row('IP', data.ip)}
        ${row('NEGARA', data.negara)}
        ${row('KOTA', data.kota)}
        ${row('ISP', data.isp)}
        ${row('TIMEZONE', data.zona)}
        ${row('KOORDINAT', data.lat + ', ' + data.lon)}
      </div>
      </div>
    `;
  } catch(e){
    sk.style.display = 'none';
    res.innerHTML = `<div class="result error" style="display:block">⚠️ Koneksi gagal!</div>`;
  } finally{
    btn.disabled = false;
    btn.textContent = '🌍 LOOKUP SEKARANG';
  }
}

function row(k, v){
  return `<div class="whois-row">
    <span class="whois-key">${k}</span>
    <span class="whois-val">${v}</span>
  </div>`;
}

function showResult(el, status, msg){
  el.className = 'result ' + status;
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
